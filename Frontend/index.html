    <!--
      Theme-blocking script: runs synchronously before any paint to apply the
      correct dark/light class to <html> instantly, preventing flash of wrong theme.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('pahadperchale-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'dark' || saved === 'light' ? saved : (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
